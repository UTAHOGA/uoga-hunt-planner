<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U.O.G.A. Google Basemap Test</title>
  <style>
    :root {
      --bg: #f4efe4;
      --panel: rgba(255, 251, 244, 0.96);
      --line: #c9a27f;
      --text: #2b1c12;
      --muted: #6b5646;
      --accent: #bf6b34;
      --accent-dark: #9e5323;
      --shadow: 0 10px 28px rgba(58, 37, 18, 0.16);
      --font-display: Georgia, "Times New Roman", serif;
      --font-ui: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      background: linear-gradient(180deg, rgba(255,252,246,.98), rgba(245,236,220,.94));
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
      z-index: 2;
    }

    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(185, 144, 111, 0.65);
      border-radius: 999px;
      background: var(--panel);
    }

    .control-group label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 8px 10px;
      border: 1px solid rgba(185, 144, 111, 0.65);
      border-radius: 999px;
      background: var(--panel);
    }

    .toggle-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .toggle-chip input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    select,
    button {
      border: 1px solid #b98962;
      border-radius: 999px;
      background: #fffaf3;
      color: var(--text);
      font: inherit;
      padding: 10px 14px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: #fff6ed;
    }

    button.secondary {
      background: #fffaf3;
      color: var(--text);
    }

    .layout {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 78px);
    }

    .overlay-card {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 2;
      width: min(460px, calc(100vw - 36px));
      padding: 14px 16px;
      border: 1px solid rgba(185, 144, 111, 0.75);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .overlay-card h2 {
      margin: 0 0 6px;
      font-family: var(--font-display);
      font-size: 22px;
      line-height: 1.05;
    }

    .overlay-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #6d4422;
    }

    .legend {
      margin-top: 10px;
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 18px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    @media (max-width: 1100px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }
    }

    @media (max-width: 900px) {
      #map {
        min-height: calc(100vh - 240px);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>U.O.G.A. Google Basemap Test</h1>
      <p>The real Google map with the core Utah overlays on top</p>
    </div>
    <div class="controls">
      <div class="control-group">
        <label for="mapTypeSelect">Map</label>
        <select id="mapTypeSelect">
          <option value="terrain">Terrain</option>
          <option value="roadmap">Roadmap</option>
          <option value="hybrid">Hybrid</option>
          <option value="satellite">Satellite</option>
        </select>
      </div>
      <div class="toggle-row">
        <label class="toggle-chip"><input id="toggleUtahFrame" type="checkbox" checked> Utah Frame</label>
        <label class="toggle-chip"><input id="toggleHuntUnits" type="checkbox" checked> Hunt Units</label>
        <label class="toggle-chip"><input id="toggleUSFS" type="checkbox" checked> USFS</label>
        <label class="toggle-chip"><input id="toggleBLM" type="checkbox" checked> BLM</label>
      </div>
      <button id="resetViewBtn" type="button" class="secondary">Reset Utah</button>
    </div>
  </header>

  <main class="layout">
    <div id="map" aria-label="Google map test"></div>
    <section class="overlay-card">
      <h2>Native Google Comparison</h2>
      <p>
        This page keeps the comparison honest: native Google terrain plus the core planning overlays you actually care about.
      </p>
      <div id="status" class="status">Loading Google map…</div>
      <div class="legend">
        <div class="legend-item"><span class="swatch" style="background:#3653b3"></span> Hunt units</div>
        <div class="legend-item"><span class="swatch" style="background:#476f2d"></span> USFS forests</div>
        <div class="legend-item"><span class="swatch" style="background:#b9722f"></span> BLM districts</div>
        <div class="legend-item"><span class="swatch" style="background:#a36a2f"></span> Utah frame</div>
      </div>
    </section>
  </main>

  <script src="google-maps-test.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBlxyY6T31oqQ7sBvGGm-Q23QU5zInRo0I&callback=initGoogleBaseline" async defer></script>
</body>
</html>
